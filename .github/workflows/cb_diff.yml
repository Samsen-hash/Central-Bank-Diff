name: Central Bank Diff
on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: true
        default: 'tone-history'
        type: choice
        options:
          - recent
          - tone-history
jobs:
  run-diff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - name: Run diff
        run: |
          if [ "${{ inputs.mode }}" = "tone-history" ]; then
            python cb_diff.py --tone-history --n 15
          else
            python cb_diff.py
          fi
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - uses: actions/upload-artifact@v4
        with:
          name: cb-diff-report
          path: output/*.html
